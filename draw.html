<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Draw — World Cup 2026 Sweepstake</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site">
    <h1>🌍 The Draw</h1>
    <div class="sub">Randomly assign all 48 teams to the family</div>
  </header>

  <nav class="tabs">
    <a href="index.html">🏆 League Table</a>
    <a href="schedule.html">📅 Fixtures</a>
    <a href="draw.html" class="active">🎲 The Draw</a>
  </nav>

  <main>
    <div id="lockBanner" class="banner hidden">
      ✅ The draw has already been completed and locked, so starting a new one is
      disabled. Hit <strong>Replay the draw</strong> to watch how the teams were
      assigned.
    </div>

    <div class="draw-controls">
      <button id="drawBtn" class="btn">🎲 Start the Draw</button>
      <button id="replayBtn" class="btn secondary hidden">▶️ Replay the draw</button>
      <button id="downloadBtn" class="btn secondary" disabled>⬇️ Download assignments.json</button>
    </div>

    <p id="status" class="note" style="text-align:center"></p>

    <div id="grid" class="members-grid"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script type="module" src="js/draw.js"></script>
</body>
</html>
